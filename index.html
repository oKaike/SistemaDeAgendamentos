<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pessoas</title>
    <style>
        #painel {
            display: none;
        }
        #inicio {
            display: block;
        }
    </style>
</head>
<body>
    <div id="inicio">
        <p>Usuario:<input type="text" id="cpf"></p><br>
        <p>Senha:<input type="text" id="senha"></p><br>
        <p><button onclick="logar()">Logar</button></p> 
    </div>
    <div id="painel">
        <p>CPF:<input type="text" id="cpf"></p><br>
        <p>Nome:<input type="text" id="nome"></p><br>
        <p>Contato:<input type="text" id="contato"></p><br>
        <p>Senha:<input type="text" id="senha"></p><br>
        <p>Agendar:<input type="date"></p>

        <p><button onclick="inserir()">Inserir</button></p> 
        <p><button id="atualizar" onclick="atualizar()">Atualizar</button></p>
        <p><button id="deletar" onclick="deletar()">Deletar</button></p>
        <p><button id="consulta">Consultar</button></p>
        <p id="resposta"></p>
    </div>

    <div id="agenda">
        <p>CPF:<input type="text" id = "cpf"></p><br>
        <p>Data:<input type="date" id="data"></p><br>
        <p>Descrição:<textarea name="" id="Descricao"></textarea></p><br>
        <button id="inserirAge" onclick="inserirAge()">Agendar</button>
        <button id="deletarAge" onclick="deletarAge()">Apagar</button>
        <button id="atualizarAge" onclick="atualizarAge()">Atualizar</button>
        <button id="consultarAge" onclick="consultarAge()">Consultar</button>
    </div>
    <script>
       function inserirAge() {
            var DadosAgenda = document.getElementById("Descricao").value;
            var Data = document.getElementById("data").value;
            var cpf = document.getElementById("cpf").value;
            var requi = new XMLHttpRequest();
            requi.open("GET",`controllerAgenda.php?cpf=${cpf}&data=${Data}&descricao=${DadosAgenda}&acao=inserir`);
            requi.send();
        }

        function deletarAge(){
            var cpf = document.getElementById("cpf").value;
            var Data = document.getElementById("data").value;
            requi = new XMLHttpRequest();
            requi.open("GET", `controllerAgenda.php?cpf=${cpf}&data=${Data}&acao=apagar`);
            requi.send();
        }
        function atualizarAge(){
            var cpf = document.getElementById("cpf").value;
            var Data = document.getElementById("data").value;
            var DadosAgenda = document.getElementById("Descricao").value;
            requi = new XMLHttpRequest();
            requi.open("GET",`controllerAgenda.php?cpf=${cpf}&data=${Data}&descricao=${DadosAgenda}&acao=atualizar`);
            requi.send();
        }
        function consultarAge(){
            var req = XMLHttpRequest();
            req.open("GET","controllerAgenda.php?acao=consultar");
            req.send();

            req.onload = function(){
               var agendamentos = JSON.parse(this.responseText);
               resul = ""
                for(i=0;agendamentos.length>0;i++){
                    resul += `<br>(${i+1})
                    <br>CPF:${agendamentos[i].cpf}
                    <br>Data:${agendamentos[i].data}
                    <br>Descrição>${agendamentos[i].descricao}`;
                }
            }
        }
        function logar() {
            var cpf = document.getElementById("cpf").value
            var senha = document.getElementById("senha").value
            
            var requisicao = new XMLHttpRequest();//Requisição HTML
            requisicao.open("GET", "controllerPessoa.php?cpf="+cpf+"&senha="+senha+"&acao=validaPessoa");
            requisicao.send();

            requisicao.onload = function(){
                var organizacao=JSON.parse(this.responseText);
                if(organizacao.length>0){
                    document.getElementById("inicio").style.display="none";
                    document.getElementById("painel").style.display="block";
                }
            }
        }
        
        function inserir(){
            var cpf = document.getElementById("cpf").value  
            var nome = document.getElementById("nome").value  
            var contato = document.getElementById("contato").value  
            var senha = document.getElementById("senha").value  
           
            var requisicao = new XMLHttpRequest();
            requisicao.open("GET","controllerPessoa.php?cpf="+cpf+"&nome="+nome+"&contato="+contato+"&senha="+senha+"&acao=inserir")
            requisicao.send();

            requisicao.onload= function(){
                document.querySelector("resposta").innerHTML = this.responseText;
            }
        }
        function agendar(){
            var cpf = document.getElementById("cpf").value
            var requisicao = new XMLHttpRequest();
            var nome = document.getElementById("nome").value  
            var contato = document.getElementById("contato").value  
            var senha = document.getElementById("senha").value  

           requisicao.open("GET","controllerPessoa.php?cpf="+cpf+"&nome="+nome+"&contato="+contato+"&senha="+senha+"&acao=agendar")
           requisicao.send();

            requisicao.onload= function(){
                document.querySelector("resposta").innerHTML = this.responseText;
            }
        }   
        function atualizar(){
            var cpf = document.getElementById("cpf").value
            var requisicao = new XMLHttpRequest();
            var nome = document.getElementById("nome").value  
            var contato = document.getElementById("contato").value  
            var senha = document.getElementById("senha").value  

           requisicao.open("GET","controllerPessoa.php?cpf="+cpf+"&nome="+nome+"&contato="+contato+"&senha="+senha+"&acao=atualizar")
           requisicao.send();

            requisicao.onload= function(){
                document.querySelector("resposta").innerHTML = this.responseText;
            }
        }   
        
    function deletar(){
            var cpf = document.getElementById('cpf').value;
            var resposta = document.getElementById('resposta');

            var requisicao = new XMLHttpRequest();

           requisicao.open("GET",`controllerPessoa.php?cpf=${cpf}&acao=apagar`)
           requisicao.send();

            requisicao.onload= function(){
                document.querySelector("resposta").innerHTML = this.responseText;
            }
        }   


        const respo = document.querySelector("#resposta");
        const bot = document.querySelector("#consulta");
        
        function consulta(){
            var requisicao = new XMLHttpRequest();//Requisição HTML
            requisicao.open ("POST", "controllerPessoa.php?acao=consultar")
            requisicao.send();

            requisicao.onload = function(){
                var organizacao = JSON.parse(this.responseText);
                var resultado = ""; 

                for(let i = 0; i < organizacao.length; i++){
                    resultado += "<br><br>PESSOA " + (i + 1) +
                    "<br>CPF: "+ organizacao[i].cpf +
                    "<br>NOME: " + organizacao[i].nome +
                    "<br>CONTATO: "+ organizacao[i].contato;
                }
                respo.innerHTML = resultado;
            }
        } 
        bot.onclick = consulta;
    </script>
</body>
</html>
